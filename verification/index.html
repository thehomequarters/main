<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeQuarters - Member Verification</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .logo {
      color: #C9A84C;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 6px;
      margin-bottom: 48px;
    }

    .card {
      background-color: #1A1A1A;
      border-radius: 16px;
      padding: 36px 28px;
      border: 1px solid #2A2A2A;
    }

    .member-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .member-code {
      color: #A0A0A0;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 24px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .status-active {
      background-color: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      border: 1px solid rgba(76, 175, 80, 0.3);
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.1);
    }

    .status-invalid {
      background-color: rgba(229, 57, 53, 0.15);
      color: #E53935;
      border: 1px solid rgba(229, 57, 53, 0.3);
    }

    .timestamp {
      color: #A0A0A0;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .loading {
      color: #A0A0A0;
      font-size: 14px;
    }

    .error-message {
      color: #A0A0A0;
      font-size: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HQ</div>

    <div id="loading" class="loading">Verifying membership...</div>

    <div id="result" class="card" style="display: none;">
      <div id="member-name" class="member-name"></div>
      <div id="member-code" class="member-code"></div>
      <div id="status-badge" class="status-badge"></div>
      <div id="timestamp" class="timestamp"></div>
    </div>

    <div id="error" style="display: none;">
      <div class="status-badge status-invalid">INVALID</div>
      <p class="error-message">This membership could not be verified.</p>
    </div>
  </div>

  <script>
    // Configuration - replace with your Supabase project details
    const SUPABASE_URL = '%%SUPABASE_URL%%';
    const SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';

    // Extract member code from URL path: /v/HQ-XXXX-XXXX
    const pathParts = window.location.pathname.split('/');
    const memberCode = pathParts[pathParts.length - 1];

    async function verifyMember() {
      if (!memberCode || !memberCode.startsWith('HQ-')) {
        showError();
        return;
      }

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/profiles?member_code=eq.${encodeURIComponent(memberCode)}&select=first_name,last_name,member_code,membership_status`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            },
          }
        );

        const data = await response.json();

        if (!data || data.length === 0) {
          showError();
          return;
        }

        const member = data[0];

        if (member.membership_status !== 'active') {
          showError();
          return;
        }

        showResult(member);
      } catch (err) {
        showError();
      }
    }

    function showResult(member) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';

      document.getElementById('member-name').textContent =
        `${member.first_name} ${member.last_name}`;
      document.getElementById('member-code').textContent = member.member_code;

      const badge = document.getElementById('status-badge');
      badge.textContent = 'ACTIVE MEMBER';
      badge.className = 'status-badge status-active';

      // Live timestamp that updates every second
      function updateTimestamp() {
        const now = new Date();
        const formatted = now.toLocaleString('en-GB', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        });
        document.getElementById('timestamp').textContent = `Verified: ${formatted}`;
      }

      updateTimestamp();
      setInterval(updateTimestamp, 1000);
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }

    verifyMember();
  </script>
</body>
</html>
